name: flutter_braintree_native
description: Flutter plugin that wraps the native Braintree SDKs. Enables payments with credit cards, PayPal, Google Pay, Apple Pay and more.
version: 0.1.0

homepage: https://github.com/bunnybuddy/flutter_braintree_native
repository: https://github.com/bunnybuddy/flutter_braintree_native
issue_tracker: https://github.com/bunnybuddy/flutter_braintree_native/issues

license: MIT

topics:
  - card-payment
  - braintree
  - paypal
  - google-pay
  - apple-pay
  - venmo

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dev_dependencies:
  flutter_lints: ^6.0.0

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.bunnybuddy.flutter_braintree_native
        pluginClass: FlutterBraintreePlugin
      ios:
        pluginClass: FlutterBraintreeCustomPlugin