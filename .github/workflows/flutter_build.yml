name: Flutter Build (FVM)on:  push:    branches:      - main  pull_request:    branches:      - mainjobs:  build:    runs-on: ubuntu-latest    steps:      - name: Checkout code        uses: actions/checkout@v4      - name: Read Flutter version from .fvmrc        id: fvm        run: |          FLUTTER_VERSION=$(cat .fvmrc | jq -r .flutter)          echo "version=$FLUTTER_VERSION" >> $GITHUB_OUTPUT      - name: Install Flutter        uses: subosito/flutter-action@v2        with:          flutter-version: ${{ steps.fvm.outputs.version }}          channel: stable      - name: Install dependencies        run: flutter pub get      - name: Analyze        run: flutter analyze